# S3 Fleet Control Plane — application config

server.port=8080

# H2 in-memory database for dev
# Switch to PostgreSQL for prod by changing these:
spring.datasource.url=jdbc:h2:file:./data/fleetdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=fleet
spring.datasource.password=fleet
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (useful for dev — see DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.s3fleet=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n